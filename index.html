<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Name Generator</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg1: #ff4d6d;
      --bg2: #ff9e00;
      --bg3: #ffd60a;
      --bg4: #2dc653;
      --bg5: #2ec4ff;
      --bg6: #5a4cff;
      --bg7: #c77dff;
      --surface: rgba(255, 255, 255, 0.2);
      --surface-strong: rgba(255, 255, 255, 0.28);
      --text: #111111;
      --shadow: rgba(0, 0, 0, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      min-height: 100vh;
      margin: 0;
      padding: 1.25rem;
      color: var(--text);
      background: linear-gradient(
        120deg,
        var(--bg1),
        var(--bg2),
        var(--bg3),
        var(--bg4),
        var(--bg5),
        var(--bg6),
        var(--bg7)
      );
      background-size: 350% 350%;
      animation: rainbowShift 16s ease infinite;
    }

    .card {
      width: min(1100px, 100%);
      margin: 0 auto;
      border-radius: 22px;
      padding: 1.25rem;
      background: var(--surface);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 45px var(--shadow);
    }

    h1 {
      margin: 0;
      font-size: 2.1rem;
      text-align: center;
    }

    .layout {
      margin-top: 1rem;
      display: grid;
      grid-template-columns: 1.25fr 0.75fr;
      gap: 1rem;
    }

    .panel {
      border-radius: 16px;
      background: var(--surface-strong);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      padding: 1rem;
    }

    .panel-title {
      margin: 0 0 0.75rem 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    p { line-height: 1.5; }

    button {
      padding: 0.75rem 1.25rem;
      font-size: 1rem;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: #111111;
      background: linear-gradient(90deg, #ffffff, #fff3bf);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.28);
    }

    .actions {
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .secondary-btn {
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: #111111;
      background: linear-gradient(90deg, #ffe1e8, #ffffff);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .secondary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    .name-box {
      margin-top: 0.85rem;
      min-height: 82px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      padding: 0.75rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.2);
    }

    #result {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .history-wrap {
      margin-top: 0.85rem;
      border-radius: 14px;
      padding: 0.6rem;
      background: rgba(255, 255, 255, 0.17);
    }

    #history {
      margin: 0;
      padding-left: 1.25rem;
      max-height: 260px;
      overflow: auto;
      line-height: 1.5;
    }

    #history li {
      margin-bottom: 0.2rem;
      word-break: break-word;
    }

    .inspired {
      margin-top: 0.8rem;
      text-align: center;
      font-size: 0.95rem;
    }

    .inspired a,
    .panel a {
      color: #111111;
      font-weight: 700;
    }

    .picrew-logo {
      width: 100%;
      margin-top: 0.75rem;
      border-radius: 12px;
      object-fit: cover;
      max-height: 240px;
      background: rgba(255, 255, 255, 0.2);
    }

    .small-note {
      margin-top: 0.65rem;
      font-size: 0.9rem;
      opacity: 0.85;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @keyframes rainbowShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Let's Party!</h1>
    <section class="layout">
      <section class="panel">
        <h2 class="panel-title">Name Generator</h2>
        <div class="actions">
          <button id="generateBtn">Generate Name</button>
          <button class="secondary-btn" id="clearBtn">Clear History</button>
        </div>
        <div class="name-box">
          <div id="result">Click &quot;Generate Name&quot; to start.</div>
        </div>
        <div class="history-wrap">
          <h2 class="panel-title">Name History</h2>
          <ol id="history"></ol>
        </div>
      </section>

      <section class="panel">
        <h2 class="panel-title">Picrew Character Creator</h2>
